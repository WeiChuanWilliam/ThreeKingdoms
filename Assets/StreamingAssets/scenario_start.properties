# 開局部隊放置（人類可讀）
# 前綴 spawn.<名稱>.* ；遊戲讀取後 → UnitDef → new Legion(def) → 綁到 hex_q / hex_r
#
# 武將 id 對 officers.json；名稱預設 = 主將全名 + 隊/軍（見 UnitNamingSettings）

# 玩家主力（Legion）
spawn.player.type=legion
spawn.player.faction=1
spawn.player.commander=1
spawn.player.food=3000
spawn.player.vice=3
spawn.player.soldiers=1000
spawn.player.wounded=500
spawn.player.morale=100
spawn.player.stamina=100
# 開局格子（與 hex_map 座標一致）
spawn.player.hex_q=12
spawn.player.hex_r=8

