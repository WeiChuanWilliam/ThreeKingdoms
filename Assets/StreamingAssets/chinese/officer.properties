# =============================================================================
# 武將系統設定（中文）— 參數暫定，可隨設計增減
# 路徑：StreamingAssets/chinese/officer.properties
# 武將實例：officers.json｜個性定義：personality_traits.json
# =============================================================================

locale=zh

# --- 六圍與相性 ---
officer.stamina.default=100
officer.compatibility.default=145
officer.compatibility.max=255

# --- 出生與壽命（壽命＝可活年數；卒年＝出生年＋壽命，由程式推算）---
officer.lifespan.default=60

# --- 兵科適性（C=0 B=1 A=2 S=3；步兵／騎兵／弓兵／器械／水軍）---
# 預設 C(0)；特色兵種（如白馬義從）另見下方 signature_troop，須該兵科大類 S(3)＋科技
officer.aptitude.default=0
# A/B/C 差異預留給戰法（之後實作）；S 為可統率該系特色兵種之前提

# --- 個性槽位（金／藍／紅上限；紫每大類上限，合成規則見 personality_traits.json）---
officer.personality.gold_max=3
officer.personality.blue_max=3
officer.personality.red_max=2
officer.personality.purple_max_per_category=1
officer.personality.total_max=8

# --- 道具（統一 item id Set，不細分欄位）---
officer.item.max_count=12

# --- 人際關係 ---
officer.relations.beloved_max=5
officer.relations.sworn_brother_max=3
officer.relations.spouse_max_male=3
officer.relations.spouse_max_female=1

# --- 特色兵種：troopKindKey → 兵科大類,科技鍵（須武將該兵科適性 S 且勢力已研發）---
# 例：白馬義從＝騎兵 S ＋ tech.horseman_baima
officer.signature_troop.horseman.baima=cavalry,tech.horseman_baima
officer.signature_troop.armor.xianzhen=infantry,tech.armor_xianzhen
officer.signature_troop.bow.wudan=archer,tech.bow_wudan
officer.signature_troop.spear.qingzhou=infantry,tech.spear_qingzhou
officer.signature_troop.knight.hubao=cavalry,tech.knight_hubao
