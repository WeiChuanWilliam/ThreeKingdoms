# =============================================================================
# 部隊相關設定（中文）
# 路徑：StreamingAssets/chinese/unit.properties
# 讀取：UnitConfigUtil.Load(GamePaths.ChineseUnitProperties)
#
# 每兵種一組：顯示名 + attack/defense/mobility/jipo/gongcheng/stamina + attack_range
# 升級樹仍在 TroopKindTree.cs，不在本檔。
#
# 水軍／江河（規劃，見 Docs/NAVY_AND_RIVER_MOVEMENT.md）：
#   寬江；水格每進一格扣 4 行動力（寬江橫渡約 3～5 日）；
#   激流：科技 + 蒙衝以上；走舸最快、不過激流、可任意靠岸；
#   走舸以外大軍渡江必須港灣进出；蒙衝等江上巡弋不需每日回港。
# =============================================================================

locale=zh

suffix.company=隊
suffix.legion=軍
name.fallback_unit=部隊
name.fallback_officer_prefix=武將
movement.daily_points=16
manpower.min_soldiers=10

# 战斗部队行军：倍率 × 兵种 mobility ÷ baseline（见 UnitMarchSpeed）
# baseline=100 表示 mobility=100 时倍率为 1.0（标准化分母）
unit.march_speed.combat=1.0
unit.mobility.baseline=100

# 军团／运输队：绝对行军 mobility（非倍率）
unit.mobility.legion=20
unit.mobility.transport=24

# 耗粮倍率（× 兵力/100 基础粮）
unit.food_factor.combat=1.0
unit.food_factor.legion=0.5
unit.food_factor.transport=0.7

# 著火率 (n!=0 且通過部隊閘)?100%:0%（有部隊且含火神→不著火）
# 日出續燃 (n!=0 且通過部隊閘)?n×step%:0%（有部隊且含滅火→不續燃）；n 暫用 terrains.fireEffect
unit.fire.burn_continuation_step=25

# 火焰傷害：各部隊類型倍率（× 基礎火傷）
unit.fire_damage_factor.combat=1.0
unit.fire_damage_factor.transport=0.8
unit.fire_damage_factor.legion=1.0
unit.fire_damage_factor.garrison=1.0

# 日出灼燒：每 1000 兵基礎死亡數（再乘地形 n、FlameLevel、部隊倍率、個性）
unit.fire.base_deaths_per_1000_soldiers=50
unit.fire.base_morale_loss_per_day=2

# 戰鬥力：六圍合 × 武將合算 × 技能 × 士氣 × 體力 × 有效兵力 / divisor
unit.combat_power.officer_scale=0.002
unit.combat_power.skill_bonus_per_skill=0.02
unit.combat_power.morale_weight=1.0
unit.combat_power.stamina_weight=1.0
unit.combat_power.manpower_divisor=100

